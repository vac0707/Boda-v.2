
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejandro & Lucía | Nuestra Boda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfbf7;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .font-cursive {
            font-family: 'Great Vibes', cursive;
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in-up 1s ease-out forwards;
        }
        .bg-gold {
            background-color: #c5a059;
        }
        .text-gold {
            color: #c5a059;
        }
        .border-gold {
            border-color: #c5a059;
        }

        /* 3D Flip Styles */
        .flip-container {
            perspective: 1000px;
        }
        .flip-card {
            position: relative;
            width: 60px;
            height: 80px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-family: 'Playfair Display', serif;
        }
        @media (min-width: 768px) {
            .flip-card {
                width: 80px;
                height: 100px;
            }
        }
        .flip-card-top, .flip-card-bottom, .flip-card-flap {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .flip-card-top {
            top: 0;
            border-radius: 4px 4px 0 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            align-items: flex-end;
        }
        .flip-card-bottom {
            bottom: 0;
            border-radius: 0 0 4px 4px;
            align-items: flex-start;
        }
        .flip-card-flap {
            top: 0;
            transform-origin: bottom;
            z-index: 3;
            border-radius: 4px 4px 0 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            backface-visibility: hidden;
        }
        .flip-card-flap.flipping {
            animation: flip-down 0.6s ease-in forwards;
        }
        @keyframes flip-down {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-180deg); }
        }
        .flip-card-number {
            font-size: 2.5rem;
            line-height: 1;
            color: #c5a059;
        }
        @media (min-width: 768px) {
            .flip-card-number {
                font-size: 3.5rem;
            }
        }
        .top-num { transform: translateY(50%); }
        .bot-num { transform: translateY(-50%); }
    </style>
<script type="importmap">
